<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Highlands Coffee</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#fff;
}

/* ================= HEADER ================= */

header{
    background:#b22830;
    color:white;
    padding:15px 40px;
}

.header-container{
    max-width:1200px;
    margin:auto;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo img{
    height:55px;
}

/* ================= HERO ================= */

.hero{
    height:600px;

    background:url('https://www.highlandscoffee.com.vn/vnt_upload/weblink/HCO_7821_ESPRESSO_LAUNCH_NEW_PRICE_NEW_KV_DC_BANNER_MWB_1920_x_926.jpg');

    background-size:cover;
    background-position:center;

    position:relative;

    display:flex;
    justify-content:center;
    align-items:flex-end;

    padding-bottom:60px;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.25);
}

.hero-content{
    position:relative;
    z-index:2;
    color:white;
    text-align:center;
}

.hero-title{
    font-size:40px;
    font-weight:bold;
}

.hero-price{
    font-size:50px;
    color:#f5b041;
    font-weight:bold;
}

/* ================= CHAT CLOSE BUTTON ================= */

#close-chat-btn{

    position:fixed;

    top:15px;
    right:15px;

    width:45px;
    height:45px;

    border:none;
    border-radius:50%;

    background:rgba(0,0,0,0.75);

    color:white;

    font-size:24px;
    cursor:pointer;

    z-index:999999;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.3s;
}

#close-chat-btn:hover{
    background:#b22830;
}

/* ================= FORCE COZE CLOSE BUTTON ================= */

.coze-web-sdk-chat-header-close,
[class*="close"],
[class*="Close"]{

    display:flex !important;

    opacity:1 !important;

    visibility:visible !important;

    cursor:pointer !important;
}

.coze-web-sdk-chat-header-close svg{
    width:20px !important;
    height:20px !important;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    .hero{
        height:350px;
    }

    .hero-title{
        font-size:28px;
    }

    .hero-price{
        font-size:36px;
    }
}

</style>
</head>

<body>

<!-- NÚT X -->
<button id="close-chat-btn">✕</button>

<!-- HEADER -->
<header>

    <div class="header-container">

        <div class="logo">
            <img src="https://www.highlandscoffee.com.vn/vnt_upload/weblink/red_BG_logo800.png">
        </div>

    </div>

</header>

<!-- HERO -->
<section class="hero">

    <div class="hero-content">

        <div class="hero-title">
            Cappuccino Đá
        </div>

        <div class="hero-price">
            59K
        </div>

    </div>

</section>

<!-- COZE SDK -->
<script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.10/libs/oversea/index.js"></script>

<script>

/* ================= COZE CHAT ================= */

const chatClient = new CozeWebSDK.WebChatClient({

    config: {

        type: 'bot',

        bot_id: '7641821512684961797',

        isIframe: false,
    },

    component_id: 'chat_' + Date.now(),

    auth: {

        type: 'token',

        token: 'YOUR_TOKEN_HERE',

        onRefreshToken: async () => 'YOUR_TOKEN_HERE'
    },

    userInfo: {

        id: 'user',

        url: 'https://sf-coze-web-cdn.coze.com/obj/eden-sg/lm-lgvj/ljhwZthlaukjlkulzlp/coze/coze-logo.png',

        nickname: 'User',
    },

    ui: {

        base: {

            icon: 'https://sf-coze-web-cdn.coze.com/obj/eden-sg/lm-lgvj/ljhwZthlaukjlkulzlp/coze/coze-logo.png',

            layout: 'pc',

            lang: 'vi',

            zIndex: 1000
        },

        header: {

            isShow: true,

            closeable: true,
        },

        asstBtn: {

            isNeed: true
        },

        footer: {

            isShow: false,
        },

        chatBot: {

            title: 'Hỗ trợ khách hàng',

            uploadable: true,

            width: 1200,

            height: 800
        },
    },
});

/* ================= CLOSE CHAT ================= */

document.getElementById('close-chat-btn').onclick = () => {

    // Tìm toàn bộ chat Coze
    const coze = document.querySelector(
        '[class*="coze"], .coze-web-sdk-chat-container'
    );

    if(coze){

        coze.style.display = 'none';
    }

    // Ẩn nút X luôn
    document.getElementById('close-chat-btn').style.display = 'none';
};

</script>

</body>
</html>
